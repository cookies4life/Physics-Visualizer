name: Build and release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: Physics-Visualizer-macOS.zip
          - os: windows-latest
            artifact: Physics-Visualizer-Windows.zip
          - os: ubuntu-latest
            artifact: Physics-Visualizer-Linux.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux Tk/Tcl support
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: pyinstaller --windowed --name "Physics Visualizer" --icon build_assets/icon.icns --noconfirm main.py

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: pyinstaller --windowed --onefile --name "Physics Visualizer" --icon build_assets/icon.ico --noconfirm main.py

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: pyinstaller --windowed --onefile --name "Physics Visualizer" --noconfirm main.py

      - name: Zip build (macOS)
        if: runner.os == 'macOS'
        run: cd dist && zip -r "../${{ matrix.artifact }}" "Physics Visualizer.app"

      - name: Zip build (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path "dist/Physics Visualizer.exe" -DestinationPath "${{ matrix.artifact }}"

      - name: Zip build (Linux)
        if: runner.os == 'Linux'
        run: cd dist && zip "../${{ matrix.artifact }}" "Physics Visualizer"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
